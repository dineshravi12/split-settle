<div class="login-container">
  <div class="login-card">
    <h1>Split & Settle 💸</h1>
    <p class="subtitle">Split expenses, settle fairly</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" pInputText />
      <label for="password">Password</label>
      <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false"></p-password>
      <button type="submit" pButton label="Sign In" [disabled]="loading" class="login-button">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <p class="register-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
<p-toast></p-toast>
