<div class="login-container">
  <div class="login-card">
    <h1>Split & Settle 💸</h1>
    <p class="subtitle">Split expenses, settle fairly</p>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <label for="name">Full Name</label>
      <input type="text" id="name" formControlName="name" pInputText />
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" pInputText />
      <label for="password">Password</label>
      <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false"></p-password>
      <button type="submit" pButton label="Create Account" [disabled]="loading" class="login-button">
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>
    <p class="register-link">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>
  </div>
</div>
<p-toast></p-toast>
