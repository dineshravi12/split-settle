<div class="auth-page">
  <aside class="auth-hero desktop-only" aria-hidden="true">
    <div class="hero-content">
      <div class="hero-mark">S</div>
      <h1 class="hero-title">Split &amp; Settle</h1>
      <p class="hero-tag">Sign up in seconds. Split forever.</p>
      <ul class="hero-points">
        <li><i class="pi pi-users"></i> Add friends by email</li>
        <li><i class="pi pi-wallet"></i> Log expenses on the go</li>
        <li><i class="pi pi-check-circle"></i> Settle up with one tap</li>
      </ul>
    </div>
    <span class="floater floater-1"></span>
    <span class="floater floater-2"></span>
    <span class="floater floater-3"></span>
    <span class="floater floater-4"></span>
  </aside>

  <section class="auth-form-wrap">
    <div class="auth-card glass-panel" [@shake]="shakeState()">
      <div class="card-header">
        <div class="card-mark">S</div>
        <h2>Create your account</h2>
        <p class="subtitle muted">Free forever. No credit card needed.</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="field" [class.filled]="!!registerForm.get('name')?.value">
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder=" "
            autocomplete="name"
          />
          <label for="name">Full name</label>
          <small
            class="field-error"
            *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid"
          >
            Name is required
          </small>
        </div>

        <div class="field" [class.filled]="!!registerForm.get('email')?.value">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder=" "
            autocomplete="email"
          />
          <label for="email">Email address</label>
          <small
            class="field-error"
            *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
          >
            Enter a valid email
          </small>
        </div>

        <div
          class="field field--with-suffix"
          [class.filled]="!!registerForm.get('password')?.value"
        >
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder=" "
            autocomplete="new-password"
          />
          <label for="password">Password</label>
          <button
            type="button"
            class="field-suffix"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          >
            <i class="pi" [class.pi-eye]="!showPassword()" [class.pi-eye-slash]="showPassword()"></i>
          </button>
          <small
            class="field-error"
            *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
          >
            At least 6 characters
          </small>
        </div>

        <button
          type="submit"
          class="btn btn-primary submit-btn"
          [class.loading]="loading()"
          [disabled]="loading()"
        >
          <span class="label">Create account</span>
        </button>
      </form>

      <p class="switch-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </section>
</div>

<p-toast position="top-right"></p-toast>
