<header class="app-header">
  <div class="header-inner">
    <button type="button" class="brand" (click)="goHome()">
      <span class="brand-mark">S</span>
      <span class="brand-text">Split &amp; Settle</span>
    </button>

    <nav class="nav-links desktop-only" aria-label="Primary">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/groups" routerLinkActive="active">Groups</a>
    </nav>

    <div class="user-area">
      <button
        type="button"
        class="icon-btn theme-toggle"
        [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="toggleTheme()"
      >
        <i class="pi" [class.pi-sun]="themeService.isDark()" [class.pi-moon]="!themeService.isDark()"></i>
      </button>

      <div class="avatar-wrap">
        <button
          type="button"
          class="avatar gradient-avatar"
          [attr.aria-label]="'Open user menu for ' + userName"
          (click)="toggleMenu($event)"
        >
          {{ initial }}
        </button>

        <div class="avatar-menu glass-panel" *ngIf="menuOpen" (click)="$event.stopPropagation()">
          <div class="menu-header">
            <div class="menu-avatar gradient-avatar">{{ initial }}</div>
            <div>
              <div class="menu-name">{{ userName || 'Guest' }}</div>
              <div class="menu-hint muted">Signed in</div>
            </div>
          </div>
          <button type="button" class="menu-item" (click)="logout()">
            <i class="pi pi-sign-out"></i>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
